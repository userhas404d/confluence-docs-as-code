name: 'Comment Sync: Confluence ↔ GitHub Discussions'
description: 'Bidirectional sync of comments between Confluence pages and GitHub Discussions (Giscus-compatible)'
branding:
  icon: 'message-circle'
  color: 'blue'
runs:
  using: 'node20'
  main: 'dist/index.js'
inputs:
  mode:
    description: 'Sync mode: "poll" for scheduled bidirectional sync, "event" for webhook-triggered single comment sync'
    required: false
    default: 'poll'
  confluence_tenant:
    description: 'Your Atlassian tenant name'
    required: true
  confluence_space:
    description: 'The key of the space hosting your documentation'
    required: true
  confluence_user:
    description: 'The username used to authenticate with Confluence REST API'
    required: true
  confluence_token:
    description: 'The token used to authenticate with Confluence REST API'
    required: true
  github_token:
    description: 'GitHub token with repo and discussions scope'
    required: true
  discussion_category:
    description: 'Name of the GitHub Discussions category (must match Giscus config)'
    required: true
  page_mapping_file:
    description: |
      Path to a page-mapping.json file generated by the docs-as-code action.
      This is the preferred approach — the mapping stays automatically in sync.
      Use the page_mapping_file output from the docs-as-code publish step.
    required: false
  page_mapping:
    description: |
      JSON array of page mappings as an inline string. Used as fallback
      when page_mapping_file is not available.
      Format: [{"pageId": 12345, "pagePath": "docs/getting-started"}, ...]
    required: false
  resolved_label:
    description: 'GitHub label to apply when a Confluence comment is resolved'
    required: false
    default: 'resolved'
  deleted_label:
    description: 'GitHub label to apply when a Confluence comment is deleted'
    required: false
    default: 'deleted-on-confluence'
outputs:
  confluence_to_github:
    description: 'JSON stats from Confluence → GitHub sync (poll mode only)'
  github_to_confluence:
    description: 'JSON stats from GitHub → Confluence sync (poll mode only)'
  sync_result:
    description: 'JSON result from single comment sync (event mode only)'
